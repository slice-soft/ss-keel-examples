[project]
name    = "jwt-auth"
module  = "jwt-auth"
version = "1.0.0"
config  = "application.properties"

[scripts]
dev   = "go run ."
build = "go build -o bin/jwt-auth ."
test  = "go test ./..."

[[addons]]
id           = "ss-keel-jwt"
version      = "1.6.0"
repo         = "github.com/slice-soft/ss-keel-jwt"
capabilities = ["auth"]

[[env]]
key      = "JWT_SECRET"
source   = "ss-keel-jwt"
required = true
secret   = true
description = "Secret key used to sign and verify JWT tokens — use a long random string in production"
