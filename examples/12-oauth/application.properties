# Application
app.name=${SERVICE_NAME:oauth-example}
app.env=${APP_ENV:development}
server.port=${PORT:7331}

# API docs
docs.path=/docs
docs.title=OAuth2 API
docs.version=1.0.0

# JWT ‚Äî added by: keel add jwt
jwt.secret=${JWT_SECRET:change-me-in-production}

# OAuth2 ‚Äî added by: keel add oauth
oauth.route-prefix=${OAUTH_ROUTE_PREFIX:/auth}
oauth.redirect-base-url=${OAUTH_REDIRECT_BASE_URL:http://127.0.0.1:7331}
oauth.redirect-on-success=${OAUTH_REDIRECT_ON_SUCCESS:}
oauth.redirect-token-param=${OAUTH_REDIRECT_TOKEN_PARAM:token}
oauth.enabled-providers=${OAUTH_ENABLED_PROVIDERS:}
oauth.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
oauth.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
oauth.github.client-id=${OAUTH_GITHUB_CLIENT_ID:}
oauth.github.client-secret=${OAUTH_GITHUB_CLIENT_SECRET:}
oauth.gitlab.client-id=${OAUTH_GITLAB_CLIENT_ID:}
oauth.gitlab.client-secret=${OAUTH_GITLAB_CLIENT_SECRET:}
