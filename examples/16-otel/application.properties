# Application
app.name=${SERVICE_NAME:otel-example}
app.env=${APP_ENV:development}
server.port=${PORT:7331}

# API docs
docs.path=/docs
docs.title=OTel Example API
docs.version=1.0.0

# OpenTelemetry — added by: keel add otel
otel.enabled=${OTEL_ENABLED:false}
otel.service-name=${OTEL_SERVICE_NAME:otel-example}
otel.service-version=${OTEL_SERVICE_VERSION:1.0.0}
otel.environment=${OTEL_ENVIRONMENT:development}
otel.exporter-otlp-endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
otel.exporter-otlp-protocol=${OTEL_EXPORTER_OTLP_PROTOCOL:http/protobuf}
otel.traces-sampler=${OTEL_TRACES_SAMPLER:parentbased_always_on}
otel.traces-sampler-arg=${OTEL_TRACES_SAMPLER_ARG:}
